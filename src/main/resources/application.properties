spring.application.name=LotusGarimpo
spring.thymeleaf.cache=false

# --- CONFIGURAÇÃO DO BANCO DE DADOS ---
# Corrigido: 'spring' (estava 'pring') e o nome do banco para 'lotus_garimpo'
spring.datasource.url=jdbc:mysql://localhost:3306/lotus_db?useTimezone=true&serverTimezone=UTC
# Login do seu phpMyAdmin (Geralmente root / vazio)
spring.datasource.username=root
spring.datasource.password=

# Driver de conexão
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do Hibernate (JPA)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=9090

# Força o Hibernate a criar as tabelas baseadas nas classes @Entity
# (mantido configuração para MySQL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# NOTA: usando dialect MySQL nas configurações anteriores


# ==========================
# Importa configurações locais (opcional)
# ==========================
# Se existir o arquivo application-oauth.properties, ele será lido também.
spring.config.import=optional:classpath:application-oauth.properties


# ==========================
# OAuth2 - Login com Google
# ==========================
# Substitua os valores abaixo pelo client-id e client-secret gerados
# no Console de APIs do Google (credenciais OAuth 2.0).
# Redirect URI deve ser configurado no Google como:
#   http://localhost:9090/login/oauth2/code/google

# Por padrão, tente ler do application-oauth.properties (recomendado)
# e, se não existir, ainda é possível usar variáveis de ambiente.

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_basic
