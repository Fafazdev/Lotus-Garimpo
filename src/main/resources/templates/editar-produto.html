<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Peça - Lótus Garimpo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link th:href="@{/css/bodyprodutos.css}" rel="stylesheet">
</head>
<body>
<header class="top-header">
    <div class="container-fluid px-4 px-lg-5 py-3">
        <div class="row align-items-center">
            <div class="col-6">
                <a th:href="@{/produtos}" class="btn btn-outline-light btn-sm">&#8592; Voltar para produtos</a>
            </div>
            <div class="col-6 text-end">
                <img th:src="@{/imagens/lotus.webp}" alt="Lótus Logo" class="logo-img" style="max-height:40px;">
            </div>
        </div>
    </div>
</header>

<main class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h3 class="mb-4 text-center">Editar peça</h3>
                        <form th:action="@{/produto/editar}" th:object="${produto}" method="post" enctype="multipart/form-data">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label class="form-label">Nome da peça</label>
                                <input type="text" class="form-control" th:field="*{nome}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Descrição</label>
                                <textarea class="form-control" th:field="*{descricao}" rows="3" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Preço</label>
                                <input type="number" class="form-control" th:value="${produto.preco}" name="preco" step="0.01" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tamanho</label>
                                <input type="text" class="form-control" th:field="*{tamanho}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Categoria</label>
                                <input type="text" class="form-control" th:field="*{categoria}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Imagem atual</label>
                                <div class="mb-2" th:if="${produto.imagem}">
                                    <img th:src="${produto.imagem}" alt="Imagem atual" class="img-fluid rounded" style="max-height:200px; object-fit:cover;">
                                </div>
                                <label class="form-label">Alterar imagem (opcional)</label>
                                <input type="file" class="form-control" name="imagem" accept="image/*">
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <a th:href="@{/produtos}" class="btn btn-outline-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Salvar alterações</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
