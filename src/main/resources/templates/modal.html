<div th:fragment="modalLogin" xmlns:th="http://www.thymeleaf.org">
    <link th:href="@{/css/modal.css}" rel="stylesheet">

    <!-- Modal de Login -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content"
                style="border-radius: 20px; overflow: hidden; border: none; background: transparent !important;">

                <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal"
                    aria-label="Close" style="z-index: 10;"></button>

                <div class="modal-body p-0">
                    <div class="form-container">
                        <p class="title">Bem-vindo</p>

                        <form class="form" th:action="@{/login}" method="POST">
                            <input type="email" name="email" class="input" placeholder="Email" required>
                            <input type="password" name="senha" class="input" placeholder="Senha" required>
                            <p class="page-link">
                                <span class="page-link-label">Esqueceu a senha?</span>
                            </p>
                            <button type="submit" class="form-btn">Entrar</button>
                        </form>

                        <p class="sign-up-label">
                            Não tem uma conta?<span class="sign-up-link" onclick="abrirCadastro()"
                                style="cursor: pointer;">Cadastre-se</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Cadastro -->
    <div class="modal fade" id="cadastroModal" tabindex="-1" aria-labelledby="cadastroModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content"
                style="border-radius: 20px; overflow: hidden; border: none; background: transparent !important;">

                <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal"
                    aria-label="Close" style="z-index: 10;"></button>

                <div class="modal-body p-0">
                    <div class="form-container">
                        <p class="title">Criar Conta</p>

                        <form class="form" id="formCadastro" th:action="@{/cadastro}" method="POST">
                            <input type="text" name="nome" class="input" placeholder="Nome Completo" required>
                            <input type="email" name="email" class="input" placeholder="Email" required>
                            <input type="text" name="cpf" class="input" placeholder="CPF" required>
                            <input type="password" name="senha" class="input" placeholder="Senha" required>
                            <input type="password" name="confirmar_senha" class="input" placeholder="Confirmar Senha"
                                required>
                            <div class="tipo-conta">
                                <label style="font-weight: 600; color: #1f3d1a; display: block; margin-bottom: 10px;">Tipo
                                    de Conta:</label>
                                <div>
                                    <label for="cliente" style="cursor: pointer;">
                                        <input type="radio" id="cliente" name="tipo" value="1" checked>
                                        Cliente
                                    </label>

                                    <label for="vendedor" style="cursor: pointer;">
                                        <input type="radio" id="vendedor" name="tipo" value="2">
                                        Vendedor
                                    </label>
                                </div>
                            </div>
                            <button type="submit" class="form-btn">Criar Conta</button>
                        </form>

                        <p class="sign-up-label">
                            Já tem uma conta?<span class="sign-up-link" onclick="voltarLogin()"
                                style="cursor: pointer;">Faça Login</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Cookies -->
    <div class="modal fade" id="cookieModal" tabindex="-1" aria-labelledby="cookieModalLabel" aria-hidden="true"
        style="display: none;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content"
                style="border-radius: 20px; overflow: hidden; border: none; background-color: #ff66b2;">
            </div>
        </div>
    </div>

    <script>
    function abrirCadastro() {
        // Fecha o modal de login
        const loginModal = bootstrap.Modal.getInstance(document.getElementById('loginModal'));
        if (loginModal) {
            loginModal.hide();
        }
        // Abre o modal de cadastro
        const cadastroModal = new bootstrap.Modal(document.getElementById('cadastroModal'));
        cadastroModal.show();
    }

    function voltarLogin() {
        // Fecha o modal de cadastro
        const cadastroModal = bootstrap.Modal.getInstance(document.getElementById('cadastroModal'));
        if (cadastroModal) {
            cadastroModal.hide();
        }
        // Abre o modal de login
        const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
        loginModal.show();
    }

    // Validação de CPF no formulário de cadastro (front-end)
    function validarCpf(cpf) {
        if (!cpf) return false;
        const numero = cpf.replace(/\D/g, '');
        if (numero.length !== 11) return false;
        if (/^(\d)\1{10}$/.test(numero)) return false; // todos iguais

        try {
            let soma = 0;
            for (let i = 0; i < 9; i++) {
                soma += parseInt(numero.charAt(i)) * (10 - i);
            }
            let resto = soma % 11;
            let dv1 = resto < 2 ? 0 : 11 - resto;
            if (dv1 !== parseInt(numero.charAt(9))) return false;

            soma = 0;
            for (let i = 0; i < 10; i++) {
                soma += parseInt(numero.charAt(i)) * (11 - i);
            }
            resto = soma % 11;
            let dv2 = resto < 2 ? 0 : 11 - resto;

            return dv2 === parseInt(numero.charAt(10));
        } catch (e) {
            return false;
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        const formCadastro = document.getElementById('formCadastro');
        if (formCadastro) {
            formCadastro.addEventListener('submit', function (e) {
                const cpfInput = formCadastro.querySelector('input[name="cpf"]');
                if (!cpfInput) return;

                const cpfValor = cpfInput.value || '';
                if (!validarCpf(cpfValor)) {
                    e.preventDefault();
                    if (typeof showAlert === 'function') {
                        showAlert('error', 'CPF inválido', 'Digite um CPF válido com 11 dígitos.');
                    } else {
                        alert('CPF inválido. Digite um CPF válido com 11 dígitos.');
                    }
                    return;
                }

                // Normaliza para apenas dígitos antes de enviar (opcional)
                cpfInput.value = cpfValor.replace(/\D/g, '');
            });
        }
    });
    </script>
</div>
