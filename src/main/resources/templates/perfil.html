<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Lótus Garimpo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/perfil.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>
<div th:replace="~{alerta :: perfilAlert}"></div>

    <main class="profile-content">
        <div class="container-fluid px-4 px-lg-5 py-5">
            <!-- Seção de Header do Perfil -->
            <div class="row mb-5">
                <div class="col-12">
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="profile-info">
                            <h1 th:text="${session.usuarioLogado?.nome ?: 'Usuário'}">Nome do Usuário</h1>
                            <p th:text="${session.usuarioLogado?.email ?: 'email@example.com'}">email@example.com</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Botões de Ação -->
            <div class="row mb-5">
                <div class="col-12 d-flex gap-3 flex-wrap">
                    <button class="btn-add-piece" data-bs-toggle="modal" data-bs-target="#addPieceModal"
                        th:if="${session.usuarioLogado != null && session.usuarioLogado.tipo == 2}">
                        <i class="fas fa-plus"></i> Adicionar Nova Peça
                    </button>

                    <a th:href="@{/}" class="btn-back-home">
                        <i class="fas fa-arrow-left"></i> Voltar ao Início
                    </a>

                    <a th:href="@{/logout}" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </a>
                </div>
            </div>

            <!-- Container Principal com Layout de Grid -->
            <div class="row g-4">
                <!-- Coluna de Informações -->
                <div class="col-lg-12">
                    <!-- Card de Informações Pessoais -->
                    <div class="card-info">
                        <label class="card-title">INFORMAÇÕES PESSOAIS</label>
                        <div class="info-section">
                            <div>
                                <span class="info-label">NOME</span>
                                <div class="editable-item" onclick="editField(this, 'nome')">
                                    <p class="editable-text-display"
                                        th:text="${session.usuarioLogado?.nome ?: 'Clique para editar'}">João Silva
                                    </p>
                                    <div class="editable-form">
                                        <div class="form-group-editable">
                                            <input type="text" class="editable-input"
                                                th:value="${session.usuarioLogado?.nome ?: ''}"
                                                placeholder="Digite seu nome">
                                        </div>
                                        <div class="button-group-editable">
                                            <button class="btn-save-edit"
                                                onclick="saveField(this, 'nome')">Salvar</button>
                                            <button class="btn-cancel-edit" onclick="cancelEdit(this)">Cancelar</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <hr>
                            <div>
                                <span class="info-label">EMAIL</span>
                                <div class="editable-item" onclick="editField(this, 'email')">
                                    <p class="editable-text-display"
                                        th:text="${session.usuarioLogado?.email ?: 'Clique para editar'}">
                                        joao@email.com</p>
                                    <div class="editable-form">
                                        <div class="form-group-editable">
                                            <input type="email" class="editable-input"
                                                th:value="${session.usuarioLogado?.email ?: ''}"
                                                placeholder="Digite seu email">
                                        </div>
                                        <div class="button-group-editable">
                                            <button class="btn-save-edit"
                                                onclick="saveField(this, 'email')">Salvar</button>
                                            <button class="btn-cancel-edit" onclick="cancelEdit(this)">Cancelar</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <hr>
                            <div>
                                <span class="info-label">TELEFONE</span>
                                <div class="editable-item" onclick="editField(this, 'telefone')">
                                    <p class="editable-text-display"
                                        th:text="${session.usuarioLogado?.telefone ?: 'Clique para editar'}">Não
                                        preenchido</p>
                                    <div class="editable-form">
                                        <div class="form-group-editable">
                                            <input type="tel" class="editable-input"
                                                th:value="${session.usuarioLogado?.telefone ?: ''}"
                                                placeholder="(XX) XXXXX-XXXX">
                                        </div>
                                        <div class="button-group-editable">
                                            <button class="btn-save-edit"
                                                onclick="saveField(this, 'telefone')">Salvar</button>
                                            <button class="btn-cancel-edit" onclick="cancelEdit(this)">Cancelar</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Card de CPF -->
                        <div class="card-info">
                            <label class="card-title">DADOS PESSOAIS</label>
                            <div class="info-section">
                                <div>
                                    <span class="info-label">CPF</span>
                                    <div class="editable-item" onclick="editField(this, 'cpf')">
                                        <p class="editable-text-display"
                                            th:text="${session.usuarioLogado?.cpf ?: 'Clique para editar'}">Não
                                            preenchido</p>
                                        <div class="editable-form">
                                            <div class="form-group-editable">
                                                <input type="text" class="editable-input"
                                                    th:value="${session.usuarioLogado?.cpf ?: ''}"
                                                    placeholder="XXX.XXX.XXX-XX">
                                            </div>
                                            <div class="button-group-editable">
                                                <button class="btn-save-edit"
                                                    onclick="saveField(this, 'cpf')">Salvar</button>
                                                <button class="btn-cancel-edit"
                                                    onclick="cancelEdit(this)">Cancelar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Card de Endereço -->
                        <div class="card-info">
                            <label class="card-title">ENDEREÇO</label>
                            <div class="info-section">
                                <div>
                                    <span class="info-label">CEP</span>
                                    <div class="editable-item" onclick="editField(this, 'cep')">
                                        <p class="editable-text-display"
                                            th:text="${session.usuarioLogado?.cep ?: 'Clique para editar'}">Não
                                            preenchido</p>
                                        <div class="editable-form">
                                            <div class="form-group-editable">
                                                <input type="text" class="editable-input" id="cepInput"
                                                    th:value="${session.usuarioLogado?.cep ?: ''}"
                                                    placeholder="XXXXX-XXX" onchange="buscarEnderecoPorCep()">
                                            </div>
                                            <div class="button-group-editable">
                                                <button class="btn-save-edit"
                                                    onclick="saveField(this, 'cep')">Salvar</button>
                                                <button class="btn-cancel-edit"
                                                    onclick="cancelEdit(this)">Cancelar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <hr>
                                <div>
                                    <span class="info-label">RUA</span>
                                    <div class="editable-item" onclick="editField(this, 'endereco')">
                                        <p class="editable-text-display"
                                            th:text="${session.usuarioLogado?.endereco ?: 'Clique para editar'}">Não
                                            preenchido</p>
                                        <div class="editable-form">
                                            <div class="form-group-editable">
                                                <input type="text" class="editable-input" id="ruaInput"
                                                    th:value="${session.usuarioLogado?.endereco ?: ''}"
                                                    placeholder="Nome da rua">
                                            </div>
                                            <div class="button-group-editable">
                                                <button class="btn-save-edit"
                                                    onclick="saveField(this, 'endereco')">Salvar</button>
                                                <button class="btn-cancel-edit"
                                                    onclick="cancelEdit(this)">Cancelar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <hr>
                                <div>
                                    <span class="info-label">NÚMERO</span>
                                    <div class="editable-item" onclick="editField(this, 'numero')">
                                        <p class="editable-text-display"
                                            th:text="${session.usuarioLogado?.numero ?: 'Clique para editar'}">Não
                                            preenchido</p>
                                        <div class="editable-form">
                                            <div class="form-group-editable">
                                                <input type="text" class="editable-input" id="numeroInput"
                                                    th:value="${session.usuarioLogado?.numero ?: ''}"
                                                    placeholder="Número">
                                            </div>
                                            <div class="button-group-editable">
                                                <button class="btn-save-edit"
                                                    onclick="saveField(this, 'numero')">Salvar</button>
                                                <button class="btn-cancel-edit"
                                                    onclick="cancelEdit(this)">Cancelar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <hr>
                                <div>
                                    <span class="info-label">COMPLEMENTO</span>
                                    <div class="editable-item" onclick="editField(this, 'complemento')">
                                        <p class="editable-text-display"
                                            th:text="${session.usuarioLogado?.complemento ?: 'Clique para editar'}">Não
                                            preenchido</p>
                                        <div class="editable-form">
                                            <div class="form-group-editable">
                                                <input type="text" class="editable-input" id="complementoInput"
                                                    th:value="${session.usuarioLogado?.complemento ?: ''}"
                                                    placeholder="Apt, sala, etc">
                                            </div>
                                            <div class="button-group-editable">
                                                <button class="btn-save-edit"
                                                    onclick="saveField(this, 'complemento')">Salvar</button>
                                                <button class="btn-cancel-edit"
                                                    onclick="cancelEdit(this)">Cancelar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <hr>
                                <div>
                                    <span class="info-label">CIDADE</span>
                                    <div class="editable-item" onclick="editField(this, 'cidade')">
                                        <p class="editable-text-display"
                                            th:text="${session.usuarioLogado?.cidade ?: 'Clique para editar'}">Não
                                            preenchido</p>
                                        <div class="editable-form">
                                            <div class="form-group-editable">
                                                <input type="text" class="editable-input" id="cidadeInput"
                                                    th:value="${session.usuarioLogado?.cidade ?: ''}"
                                                    placeholder="Cidade">
                                            </div>
                                            <div class="button-group-editable">
                                                <button class="btn-save-edit"
                                                    onclick="saveField(this, 'cidade')">Salvar</button>
                                                <button class="btn-cancel-edit"
                                                    onclick="cancelEdit(this)">Cancelar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <hr>
                                <div>
                                    <span class="info-label">ESTADO</span>
                                    <div class="editable-item" onclick="editField(this, 'estado')">
                                        <p class="editable-text-display"
                                            th:text="${session.usuarioLogado?.estado ?: 'Clique para editar'}">Não
                                            preenchido</p>
                                        <div class="editable-form">
                                            <div class="form-group-editable">
                                                <input type="text" class="editable-input" id="estadoInput"
                                                    th:value="${session.usuarioLogado?.estado ?: ''}" placeholder="UF">
                                            </div>
                                            <div class="button-group-editable">
                                                <button class="btn-save-edit"
                                                    onclick="saveField(this, 'estado')">Salvar</button>
                                                <button class="btn-cancel-edit"
                                                    onclick="cancelEdit(this)">Cancelar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de adicionar peça vindo do fragmento modal.html -->
    <div th:replace="~{modal :: perfilModals}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/perfil.js}"></script>

    <!-- exibe alerta de sucesso quando produto é adicionado -->
    <script th:if="${mensagemPeca}">
        showAlert('success','Tudo certo','[[${mensagemPeca}]]');
    </script>

</body>

</html>
